name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Lint & Format check
        run: npx biome check .

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
